title: Frequently Asked Questions About Services
eyebrow: FAQs
heroTitle: Answers Built for Legal Records Teams
description: >-
  Find clear and concise answers to common questions about our process,
  services, and how we support legal teams with records retrieval.
items:
  - question: How long do mobile carrier record requests take?
    answer: >-
      Response times vary depending on the carrier, jurisdiction, and type of
      legal request. Data for Lawyers helps manage the process from submission
      through delivery, providing visibility into the status of your records
      request every step of the way. Responses are typically due within 30 days
      of service. Objections must be raised within 15 days. Extensions may be
      negotiated between parties. Court intervention may modify these timeframes.
  - question: What records should I request from a mobile carrier?
    answer: >-
      The appropriate records depend on the facts of your case. Data for Lawyers
      helps legal professionals identify and request the records needed for
      their matter, whether through a DWQ, subpoena, or other authorized legal
      process.
  - question: How should questions about phone records be structured?
    answer: >-
      A well-prepared request can help minimize delays and improve the quality
      of records received. Our platform helps ensure requests are organized,
      complete, and tailored to the records being sought.
  - question: How are records authenticated?
    answer: >-
      Authentication requirements vary by carrier and jurisdiction. Data for
      Lawyers helps facilitate requests for authenticated, court-ready records
      whenever available, reducing the need to navigate each carrier's unique
      requirements independently.
  - question: What technical details should be requested?
    answer: >-
      Mobile carrier records often contain technical information that can affect
      how the records are interpreted. Data for Lawyers helps ensure important
      technical details are considered throughout the request process.
  - question: How should preservation requests be handled?
    answer: >-
      When records may be subject to retention limits, acting quickly is
      important. Data for Lawyers helps streamline preservation requests and
      other time-sensitive records requests to help reduce the risk of losing
      potentially relevant information.
  - question: What are common carrier-specific considerations?
    answer: >-
      Every mobile carrier has its own procedures, forms, processing timelines,
      and authentication requirements. Data for Lawyers helps simplify those
      differences through a consistent, centralized workflow.
  - question: How should deleted or missing records be addressed?
    answer: >-
      If requested records are unavailable or have been deleted under a carrier's
      retention policy, understanding what remains available is critical. Data
      for Lawyers helps navigate those situations and obtain what can still be
      produced.
  - question: Are business accounts handled differently?
    answer: >-
      Business accounts often involve additional documentation, account
      structures, and authorization requirements. Data for Lawyers helps manage
      those complexities while keeping the request process organized.
  - question: Why is metadata important?
    answer: >-
      Metadata can provide important context that supports the interpretation of
      mobile carrier records. Data for Lawyers helps ensure relevant information
      is requested and delivered in an organized, usable format.
  - question: What billing records should be requested?
    answer: >-
      Billing records can provide valuable account history and supporting
      information depending on the needs of your case. Data for Lawyers helps
      identify the appropriate records to request without requiring you to manage
      each carrier’s unique process alone.
  - question: How are multiple devices handled?
    answer: >-
      Cases involving multiple devices or accounts can quickly become difficult
      to manage. Data for Lawyers centralizes requests, tracks progress, and
      helps organize records across multiple phones, accounts, and carriers.
  - question: What privacy considerations apply?
    answer: >-
      Mobile carrier records are subject to applicable legal and privacy
      requirements. Data for Lawyers is designed to support authorized legal
      records requests while helping legal professionals navigate those
      requirements.
