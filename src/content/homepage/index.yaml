faqs:
  - question: How long do mobile carrier record requests take?
    answer: >-
      Response times vary depending on the carrier, jurisdiction, and type of
      legal request. Data for Lawyers helps manage the process from submission
      through delivery, providing visibility into the status of your records
      request every step of the way. Responses are typically due within 30 days
      of service. Objections must be raised within 15 days. Extensions may be
      negotiated between parties. Court intervention may modify these
      timeframes.
  - question: What records should I request from a mobile carrier?
    answer: >-
      The appropriate records depend on the facts of your case. Data for Lawyers
      helps legal professionals identify and request the records needed for
      their matter, whether through a DWQ, subpoena, or other authorized legal
      process.
  - question: How should questions about phone records be structured?
    answer: >-
      A well-prepared request can help minimize delays and improve the quality
      of records received. Our platform helps ensure requests are organized,
      complete, and tailored to the records being sought.
  - question: How are records authenticated?
    answer: >-
      Authentication requirements vary by carrier and jurisdiction. Data for
      Lawyers helps facilitate requests for authenticated, court-ready records
      whenever available, reducing the need to navigate each carrier's unique
      requirements independently.
  - question: What technical details should be requested?
    answer: >-
      Mobile carrier records often contain technical information that can affect
      how the records are interpreted. Data for Lawyers helps ensure important
      technical details are considered throughout the request process.
  - question: How should preservation requests be handled?
    answer: >-
      When records may be subject to retention limits, acting quickly is
      important. Data for Lawyers helps streamline preservation requests and
      other time-sensitive records requests to help reduce the risk of losing
      potentially relevant information.
